name: build

on:
  workflow_dispatch: 
  pull_request:
  push:
    paths-ignore: [ "README.md" ]

defaults:
  run:
    shell: PowerShell

jobs:
  build:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      fail-fast: false
      matrix:
        operating-system: [ windows-latest ]
        lazarus-versions: ["dist", "stable", "4.4"]

    steps:
    - name: Checkout source code
      uses: actions/checkout@v6

    - name: Install Lazarus
      uses: gcarreno/setup-lazarus@v3
      with:
        lazarus-version: ${{ matrix.lazarus-versions }}
        include-packages: "LNet"
        with-cache: false

    - name: Build the Main Application (Windows)
      if: ${{ matrix.operating-system == 'windows-latest' }}
      run: lazbuild -B "src/librtlsdr_wincontrol.lpi"

    - name: Copy for upload
      run: |
          copy src/lib . -recurse
                
    - name: List
      run: |
          echo "********************************************"
          ls -Recurse -Exclude ".git,debian" -Path  "${{ runner.workspace }}" 
          echo "********************************************"

    - name: package and upload
      uses: actions/upload-artifact@v6
      with:
        name: librtlsdr_control-${{ matrix.lazarus-versions}
        path: |
            lib/x86_64-win64/*.exe
            COPYING**
            AUTHORS**
            README**

